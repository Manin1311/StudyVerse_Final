services:
  - type: web
    name: studyverse
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    # gthread worker + threading async_mode — no eventlet/gevent needed
    startCommand: gunicorn --worker-class gthread --threads 4 -w 1 --timeout 120 --bind 0.0.0.0:$PORT --log-level info --capture-output --error-logfile - app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: WEB_CONCURRENCY
        value: 1




