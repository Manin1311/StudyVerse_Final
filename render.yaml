services:
  - type: web
    name: studyverse
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    # sync worker — Flask-SocketIO async_mode='threading' manages threads internally
    startCommand: gunicorn --worker-class sync -w 1 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: WEB_CONCURRENCY
        value: 1
      - key: PYTHONUNBUFFERED
        value: "1"




